<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TeleCoder{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               background: #0d1117; color: #c9d1d9; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 20px; }
        header { border-bottom: 1px solid #21262d; padding-bottom: 16px; margin-bottom: 24px; }
        header h1 { font-size: 24px; color: #58a6ff; }
        header h1 a { color: #58a6ff; text-decoration: none; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; }
        th { color: #8b949e; font-weight: 600; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px;
                 font-size: 12px; font-weight: 600; }
        .badge-running { background: #1f6feb33; color: #58a6ff; }
        .badge-completed { background: #23863633; color: #3fb950; }
        .badge-stopped { background: #da360833; color: #f85149; }
        .badge-created { background: #30363d; color: #8b949e; }
        .badge-failed { background: #da360833; color: #f85149; }
        pre { background: #161b22; border: 1px solid #21262d; border-radius: 6px;
              padding: 16px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
        .section { margin-bottom: 24px; }
        .section h2 { font-size: 18px; margin-bottom: 12px; color: #c9d1d9; }
        .info-grid { display: grid; grid-template-columns: 140px 1fr; gap: 4px 16px; }
        .info-label { color: #8b949e; font-size: 13px; }
        .info-value { font-size: 14px; }
        .btn { display: inline-block; padding: 6px 16px; border-radius: 6px;
               border: 1px solid #30363d; background: #21262d; color: #c9d1d9;
               cursor: pointer; font-size: 14px; }
        .btn:hover { background: #30363d; border-color: #8b949e; text-decoration: none; }
        .btn-danger { border-color: #f8514933; color: #f85149; }
        .btn-danger:hover { background: #da360833; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">TeleCoder</a></h1>
        </header>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
